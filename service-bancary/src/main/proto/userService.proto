syntax = "proto3";

option java_multiple_files = true;
option java_package = "dev.cruzs.gustavo.service_bancary.user.adapters.inbound.gRPC.generated";

message UserResponse {
  string id = 1;
  string name = 2;
  string dateOfBirth = 3;
  string email = 4;
  string cpf = 5;
}

message FindUserByIdRequest {
  string id = 1;
}

service UserService {
  rpc FindUserById (FindUserByIdRequest) returns (UserResponse);
}
