spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service-create-user
          uri: no://op
          predicates:
            - Path=/api/v1/auth/create-user
            - Method=POST
          filters:
            - CreateUserProducer
    stream:
      bindings:
        createUserProducer-out-0:
          destination: exchange-auth-service
