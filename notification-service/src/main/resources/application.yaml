spring:
  threads:
    virtual:
      enabled: true
  application:
    name: notification-service

  mail:
    host: ${HOST_MAIL:sandbox.smtp.mailtrap.io}
    port: ${PORT_MAIL:2525}
    username: ${USERNAME_MAIL}
    password: ${PASSWORD_MAIL}
    properties.mail.smtp.auth: true
    properties.mail.smtp.starttls.enable: true

  rabbitmq:
    host: ${HOST_RMQ:localhost}
    port: ${PORT_RMQ:5672}
    username: ${USERNAME_RMQ:guest}
    password: ${PASSWORD_RMQ:guest}
    virtual-host: /

  cloud:
    function:
      definition: sendEmailConsumer
    stream:
      default:
        consumer:
          max-attempts: 3
          backOffInitialInterval: 5000
          error-channel-enabled: true
          retryable-exceptions:
            java.lang.ClassCastException: false
            jakarta.validation.ConstraintViolationException: false
      bindings:
        sendEmailConsumer-in-0:
          destination: exchange-notification
          group: queue-sendEmail
      rabbit:
        default:
          consumer:
            auto-bind-dlq: true
            republish-to-dlq: true
